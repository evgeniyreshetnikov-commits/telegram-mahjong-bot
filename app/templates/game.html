<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Telegram Mahjong</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-shell" id="appShell">
        <header class="topbar">
            <div>
                <h1>Маджонг</h1>
                <p>Shanghai Mahjong для Telegram</p>
            </div>
            <div class="topbar-actions">
                <button id="restartBtn" class="ghost-btn">Новая игра</button>
            </div>
        </header>

        <section class="stats compact-stats">
            <div class="stat-card">
                <span>Очки</span>
                <strong id="score">0</strong>
            </div>
            <div class="stat-card">
                <span>Ходы</span>
                <strong id="moves">0</strong>
            </div>
            <div class="stat-card">
                <span>Осталось</span>
                <strong id="tilesLeft">0</strong>
            </div>
            <div class="stat-card">
                <span>Подсказки</span>
                <strong id="hintsLeft">0</strong>
            </div>
        </section>

        <main class="game-main">
            <div class="board-shell" id="boardShell">
                <div class="board-toolbar">
                    <div class="board-badges">
                        <span id="difficultyBadge" class="chip-badge">Лёгкий</span>
                        <span id="themeBadge" class="chip-badge">Classic Green</span>
                        <span id="layoutBadge" class="chip-badge">Черепаха</span>
                    </div>
                    <div class="board-zoom-controls">
                        <button id="zoomOutBtn" class="ghost-btn small-btn" type="button">−</button>
                        <button id="recenterBtn" class="ghost-btn small-btn" type="button">Центр</button>
                        <button id="zoomInBtn" class="ghost-btn small-btn" type="button">+</button>
                    </div>
                </div>
                <div class="board-viewport" id="boardViewport">
                    <canvas id="boardCanvas"></canvas>
                    <div id="boardHitLayer" class="board-hit-layer"></div>
                </div>
            </div>
            <div id="message" class="message"></div>
        </main>

        <footer class="footer-actions">
            <button id="hintBtn" class="ghost-btn">Подсказка</button>
            <button id="sendResultBtn" class="primary-btn">Отправить результат в бот</button>
        </footer>

        <details class="settings-panel" id="settingsPanel">
            <summary>Настройки игры</summary>
            <section class="control-panel">
                <div class="panel-block">
                    <div class="panel-title-row">
                        <h2>Режим игры</h2>
                    </div>
                    <div id="difficultyControls" class="segmented"></div>
                </div>

                <div class="panel-block">
                    <div class="panel-title-row">
                        <h2>Фон стола</h2>
                    </div>
                    <div id="themeControls" class="chip-grid"></div>
                </div>

                <div class="panel-block">
                    <div class="panel-title-row">
                        <h2>Раскладка</h2>
                    </div>
                    <div id="layoutControls" class="chip-grid"></div>
                </div>
            </section>

            <section class="legend">
                <p>
                    Собирай пары одинаковых свободных плиток. Плитка свободна, если её
                    <b>не перекрывает верхний слой</b> и у неё открыта <b>левая или правая сторона</b>.
                </p>
            </section>
        </details>
    </div>

    <script>
        window.APP_CONFIG = {
            baseUrl: "{{ base_url }}"
        };
    </script>
    <script src="/static/game.js"></script>
</body>
</html>
